name: Build and Release

on:
  push:
    tags:
      - "v*" # 当你推送形如 v1.0.0 的 tag 时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Update version in manifest.json
        run: |
          # 提取 tag 名称并去掉前缀的 'v' (例如从 v0.2.4 变成 0.2.4)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          # 使用 jq 自动更新 manifest.json 的 version 字段
          jq ".version = \"$VERSION\"" manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Build XPI file
        run: |
          # 将你的插件文件打包为 .xpi 格式
          zip -r homework-contact-collector.xpi manifest.json background.js picker.html picker.js README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: homework-contact-collector.xpi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 如果需要全自动提交签名到 Thunderbird (ATN)，可取消注释以下步骤：
