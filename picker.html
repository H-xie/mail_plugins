<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>选择通讯录</title>
  <style>
    body {
      font-family: system-ui, "Segoe UI", sans-serif;
      padding: 18px 22px 14px;
      margin: 0;
      min-width: 360px;
      box-sizing: border-box;
    }
    h3 { margin: 0 0 14px; font-size: 14px; color: #222; }
    label { display: block; margin-bottom: 4px; font-size: 12px; color: #555; }
    select,
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #bbb;
      border-radius: 4px;
    }
    select { margin-bottom: 10px; }
    #newBookArea { margin-bottom: 10px; }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }
    button {
      padding: 6px 18px;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #999;
      background: #f0f0f0;
    }
    #confirmBtn {
      background: #0060df;
      color: #fff;
      border-color: #0060df;
    }
    #confirmBtn:hover { background: #0050bb; }
    #confirmBtn:disabled { background: #88aadd; border-color: #88aadd; cursor: default; }
    #status { font-size: 12px; color: #c00; min-height: 16px; margin-top: 6px; }
  </style>
</head>
<body>
  <h3>保存选中邮件到通讯录</h3>

  <label for="bookSelect">选择通讯录</label>
  <select id="bookSelect"></select>

  <div id="newBookArea" style="display:none">
    <label for="newBookName">新通讯录名称</label>
    <input type="text" id="newBookName" placeholder="请输入通讯录名称" />
  </div>

  <div id="status"></div>

  <div class="actions">
    <button id="cancelBtn">取消</button>
    <button id="confirmBtn">确认保存</button>
  </div>

  <script src="picker.js"></script>
</body>
</html>
